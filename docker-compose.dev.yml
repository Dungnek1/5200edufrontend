version: "3.8"

services:
  redis-fe:
    container_name: 5200-redis-fe-dev
    image: redis:latest
    hostname: redis-fe
    restart: unless-stopped
    command: redis-server --port 6378 --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6378:6378"
    networks:
      5200edu-network:
        aliases:
          - redis-fe
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6378", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    container_name: 5200-frontend-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:5005}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.5200ai.com/api/v1}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - NEXT_PUBLIC_MINIO=${NEXT_PUBLIC_MINIO:-https://minio.5200ai.com}
      - REDIS_URL=redis://redis-fe:6378
      - NEXTAUTH_URL=http://localhost:5005
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-key}
      # Hot reload optimizations
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      - FAST_REFRESH=true
      - TURBOPACK=true
      - NEXT_WEBPACK_WATCH_OPTIONS_POLL=500
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    ports:
      - "5005:5005"
      - "3001:3001"
    networks:
      - 5200edu-network
    depends_on:
      redis-fe:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5005', (r) => {process.exit((r.statusCode >= 200 && r.statusCode < 400) ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis-commander-fe:
    container_name: 5200-redis-commander-fe-dev
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis-fe:6378
    ports:
      - "8081:8081"
    networks:
      - 5200edu-network
    depends_on:
      redis-fe:
        condition: service_healthy

volumes:
  redis-data:
    driver: local
  node_modules:
    driver: local
  next_cache:
    driver: local

networks:
  5200edu-network:
    external: true
